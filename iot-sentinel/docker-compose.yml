

services:

        
    
    #service 1: mqtt-broker
    mqtt-broker: 
        image: eclipse-mosquitto:2.1-alpine
        container_name : ${MQTT_NAME}
        ports:
            - "1883:1883"
        volumes: 
            - ./docker/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
            - ./docker/mosquitto/data:/mosquitto/data
            - ./docker/mosquitto/log:/mosquitto/log
        restart: unless-stopped 
        
    
    #service 2: redis cache memory
    redis: 
        image: redis:8.4.4-alpine
        container_name: ${RDS_NAME}
        command: redis-server --appendonly yes
        volumes:
            - redisData:/data
        ports: 
            - ${RDS_PORT}:6379
        restart: unless-stopped

    #service #3: db PostgreSQL 
    db: 
        image: postgres:16.14-bookworm
        container_name : postgres-db
        environment: 
                POSTGRES_USER : ${DB_USER}
                POSTGRES_PASSWORD : ${DB_PASSWORD}
                POSTGRES_DB: ${DB_NAME}
        ports:
            -  ${DB_PORT}:5432
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped

volumes: 
     postgres_data: 
     redisData:   
    
