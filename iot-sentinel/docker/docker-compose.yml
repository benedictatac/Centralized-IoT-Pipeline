
version: '3.8'

services:
    #service 1: custom Python FastAPI 
    web-app:
        build: . 
        ports: 
            - "8000:8000"
        
        depends_on:
            - db 
            - mqtt-broker 
            - redis db 
        
    

    mqtt: 
        image: eclipse-mosquitto::2.1-alpine
        container_name : ${MQTT_NAME}
        ports:
            - "1883:1883"
            
        
    #service #2: db PostgreSQL 
    db: 
        image: 18.4-bookworm
        container_name : postgres-db
        environment: 
                POSTGRES_USER : ${DB_USER}
                POSTGRES_PASSWORD : ${DB_PASSWORD}
                POSTGRES_NAME : ${DB_NAME}
        ports:
            -  ${DB_PORT}
        volumes:
            - postgres_data:/var/lib/postgresql/data
        restart: unless-stopped  
        
volumes: 
       postgres_data: 
    
