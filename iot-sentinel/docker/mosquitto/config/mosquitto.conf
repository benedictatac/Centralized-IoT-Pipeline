
# =================================================================
# Persistence (Saves messages to disk so they survive restarts)
# =================================================================
persistence true
persistence_location /mosquitto/data/

# =================================================================
# Logging (Helps you debug connection issues)
# =================================================================
log_dest file /mosquitto/log/mosquitto.log
log_type error
log_type warning
log_type notice
log_type information

# =================================================================
# Connection Listeners
# =================================================================
# Standard MQTT Port (Allows external connections)
listener 1883

# =================================================================
# Security & Authentication
# =================================================================
# Disable anonymous connections (Highly recommended!)
allow_anonymous true
